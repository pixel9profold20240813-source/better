<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實時對決 | Liquid Minimal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] 
                    },
                    colors: {
                        liquid: {
                            text: '#1d1d1f',
                            gray: '#86868b',
                            blue: '#0071e3',
                            blueHover: '#0077ED',
                            bg: '#f5f5f7'
                        }
                    },
                    animation: {
                        'liquid-morph': 'morph 8s ease-in-out infinite',
                        'blob': 'blob 15s infinite alternate',
                        'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards'
                    },
                    keyframes: {
                        morph: {
                            '0%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' },
                            '50%': { borderRadius: '30% 70% 70% 30% / 30% 30% 70% 70%' },
                            '100%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' }
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '100%': { transform: 'translate(40px, -40px) scale(1.1)' }
                        },
                        fadeIn: { '0%': { opacity: 0, transform: 'translateY(10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        scaleIn: { 
                            '0%': { opacity: 0, transform: 'scale(0.85) translateY(10px)' }, 
                            '100%': { opacity: 1, transform: 'scale(1) translateY(0)' } 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #f4f6f9;
            color: #1d1d1f;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 核心：液態毛玻璃效果 */
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.3) 100%);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
        }
        
        .liquid-glass-heavy {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.6) 100%);
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-left: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        /* 簡約輸入框 */
        .liquid-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .liquid-input:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
            outline: none;
        }

        /* 按鈕縮放回饋 */
        .btn-press { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease, background-color 0.2s ease, border-color 0.2s ease; }
        .btn-press:active:not(:disabled) { transform: scale(0.96); }

        /* Toast 動畫 */
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-animate { animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen relative font-sans">

    <!-- Global Toast Container -->
    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-[70] flex flex-col gap-3 pointer-events-none w-full max-w-sm px-4"></div>

    <!-- Modals (with scale-in animations) -->
    
    <!-- Confirm Modal -->

            <div class="flex flex-col gap-3">

                <button id="btn-confirm-cancel" class="w-full py-3.5 bg-white/60 hover:bg-white text-gray-700 rounded-xl font-semibold border border-white transition-colors btn-press">取消</button>
            </div>

    </div>

    <!-- Input Modal -->
    <div id="input-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-gray-900/20 backdrop-blur-sm transition-opacity"></div>
        <div class="liquid-glass-heavy rounded-3xl p-6 max-w-[300px] w-full shadow-2xl relative z-10 animate-scale-in text-center">
            <h3 id="input-modal-title" class="text-lg font-bold mb-4"></h3>
            <input type="number" id="input-modal-value" class="w-full liquid-input rounded-xl px-4 py-3 mb-6 font-medium text-center" />
            <div class="flex flex-col gap-3">
                <button id="btn-input-ok" class="w-full py-3.5 bg-liquid-blue hover:bg-liquid-blueHover text-white rounded-xl font-semibold transition-colors btn-press shadow-md shadow-blue-500/20">確認</button>
                <button id="btn-input-cancel" class="w-full py-3.5 bg-white/60 hover:bg-white text-gray-700 rounded-xl font-semibold border border-white transition-colors btn-press">取消</button>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjpVHUYvBYh1jOylLlX9gHrTLibEFjF2I",
            authDomain: "realtimebettingapp.firebaseapp.com",
            projectId: "realtimebettingapp",
            storageBucket: "realtimebettingapp.firebasestorage.app",
            messagingSenderId: "824284688785",
            appId: "1:824284688785:web:18a9c711c59a4017602a30",
            measurementId: "G-WZC238ZGBV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = 'pixel9profold20240813@gmail.com';
        const COL_USERS = 'betting_users';
        const COL_STATE = 'betting_state';
        const COL_BETS = 'betting_bets';

        let currentUser = null, usersData = [], myData = null, gameState = null, betsData = [];
        let timeLeft = 0;
        let unsubUsers, unsubState, unsubBets;
        
        // 紀錄當前選取的皮膚箱，預設為皮膚箱1
        let selectedSkinBox = '皮膚箱1';

        // --- Toast & Modals ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `liquid-glass-heavy px-5 py-3 rounded-full flex items-center gap-3 toast-animate pointer-events-auto font-medium text-sm shadow-xl mx-auto w-max`;
            
            let icon = '';
            if(type === 'success') icon = '<i class="fas fa-check-circle text-green-500 text-lg"></i>';
            else if(type === 'error') icon = '<i class="fas fa-exclamation-circle text-red-500 text-lg"></i>';
            else if(type === 'warning') icon = '<i class="fas fa-exclamation-triangle text-yellow-500 text-lg"></i>';
            else icon = '<i class="fas fa-info-circle text-liquid-blue text-lg"></i>';

            toast.innerHTML = `${icon} <span class="text-gray-800 tracking-wide">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        // Helper 移除並重加 hidden 觸發動畫
        function openModalWithAnim(id) {
            const el = document.getElementById(id);
            el.classList.remove('hidden');
        }

        let confirmCallback = null;
        function showConfirm(message, callback) {
            document.getElementById('confirm-message').textContent = message;
            openModalWithAnim('confirm-modal');
            confirmCallback = callback;
        }

        document.getElementById('btn-confirm-cancel').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            confirmCallback = null;
        });
        document.getElementById('btn-confirm-ok').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (confirmCallback) confirmCallback();
            confirmCallback = null;
        });

        // Input Modal Logic
        let inputCallback = null;
        function showInputModal(title, placeholder, callback) {
            document.getElementById('input-modal-title').textContent = title;
            const inputEl = document.getElementById('input-modal-value');
            inputEl.placeholder = placeholder;
            inputEl.value = '';
            openModalWithAnim('input-modal');
            inputEl.focus();
            inputCallback = callback;
        }

        document.getElementById('btn-input-cancel').addEventListener('click', () => {
            document.getElementById('input-modal').classList.add('hidden');
            inputCallback = null;
        });
        document.getElementById('btn-input-ok').addEventListener('click', () => {
            const val = document.getElementById('input-modal-value').value;
            document.getElementById('input-modal').classList.add('hidden');
            if (inputCallback) inputCallback(val);
            inputCallback = null;
        });

        function showView(viewId) {
            ['view-loading', 'view-login', 'view-bind', 'view-host', 'view-client'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            if (viewId) openModalWithAnim(viewId);
        }

        // --- Auth 邏輯 ---
        showView('view-loading'); 

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (!user) {
                clearListeners();
                
                usersData = [];
                myData = null;
                gameState = null;
                betsData = [];
                
                document.getElementById('navbar').classList.add('hidden');
                showView('view-login');
            } else {
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('nav-email').textContent = user.email;
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('nav-title').textContent = '控制中心';
                }
                setupRealtimeListeners();
            }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            showView('view-loading');
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch((error) => {
                showView('view-login');
                if(error.code !== 'auth/popup-closed-by-user') showToast("登入發生錯誤", "error");
            });
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // --- 資料庫與全局計時器 ---
        function setupRealtimeListeners() {
            unsubUsers = onSnapshot(collection(db, COL_USERS), (snap) => {
                usersData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                myData = usersData.find(u => u.uid === currentUser.uid);
                renderLogic();
            });

            unsubState = onSnapshot(collection(db, COL_STATE), (snap) => {
                const current = snap.docs.find(d => d.id === 'current');
                gameState = current ? current.data() : null;
                renderLogic();
            });

            unsubBets = onSnapshot(collection(db, COL_BETS), (snap) => {
                betsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderLogic();
            });
        }

        function clearListeners() {
            if (unsubUsers) unsubUsers();
            if (unsubState) unsubState();
            if (unsubBets) unsubBets();
        }

        setInterval(() => {
            const now = Date.now();
            if (gameState && gameState.status === 'betting') {
                const elapsed = Math.floor((now - gameState.startTime) / 1000);
                timeLeft = Math.max(0, 10 - elapsed);
                updateClientUIFromTimer();
                if (currentUser && currentUser.email === ADMIN_EMAIL) renderHost();
            }
        }, 1000);

        function renderLogic() {
            if (!currentUser) return;
            if (currentUser.email === ADMIN_EMAIL) {
                showView('view-host');
                renderHost();
            } else {
                if (!myData) {
                    showView('view-bind');
                } else {
                    showView('view-client');
                    renderClient();
                }
            }
        }

        // --- 主持端介面 ---
        function renderHost() {
            const stateDiv = document.getElementById('host-state-content');
            const resolvePanel = document.getElementById('host-resolve-panel');
            
            if (!gameState) {
                stateDiv.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 py-6"><p class="text-sm font-medium">尚未發起</p></div>`;
                resolvePanel.classList.add('hidden');
            } else {
                let statusHtml = '';
                if (gameState.status === 'betting') {
                    statusHtml = `<span class="text-sm font-bold text-liquid-blue flex items-center gap-1.5"><i class="fas fa-circle-notch fa-spin"></i> 押注中 (${timeLeft}s)</span>`;
                    resolvePanel.classList.remove('hidden');
                } else {
                    const winOpt = gameState.result === 'A' ? gameState.optionA : gameState.optionB;
                    statusHtml = `<span class="text-sm font-bold text-gray-500 flex items-center gap-1.5"><i class="fas fa-flag-checkered"></i> 結算 (${winOpt} 勝)</span>`;
                    resolvePanel.classList.add('hidden');
                }

                stateDiv.innerHTML = `
                    <div class="bg-white/40 border border-white rounded-2xl p-5 mb-4 text-center shadow-sm">
                        <h4 class="text-xl font-bold text-gray-800 tracking-tight mb-3">${gameState.title}</h4>
                        <div class="flex justify-center items-center gap-3 text-sm font-bold">
                            <span class="px-4 py-2 bg-white/70 rounded-xl text-gray-700 w-1/2 truncate shadow-sm border border-white">${gameState.optionA}</span>
                            <span class="text-gray-400 text-xs">VS</span>
                            <span class="px-4 py-2 bg-white/70 rounded-xl text-gray-700 w-1/2 truncate shadow-sm border border-white">${gameState.optionB}</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between px-1">
                        ${statusHtml}
                        <span class="text-xs font-bold text-liquid-gray uppercase tracking-widest">${betsData.length} 參與</span>
                    </div>
                `;
            }

            const tbody = document.getElementById('host-table-body');
            tbody.innerHTML = '';
            const sortedUsers = [...usersData].sort((a, b) => (b.coins || 0) - (a.coins || 0));
            
            if (sortedUsers.length === 0) {
                tbody.innerHTML = `<tr><td colSpan="4" class="py-8 text-center text-liquid-gray text-sm">無玩家</td></tr>`;
            } else {
                sortedUsers.forEach((u, index) => {
                    const userBet = betsData.find(b => b.uid === u.uid);
                    let betHtml = `<span class="text-gray-400/80 text-xs font-medium border border-gray-300/50 px-2 py-1 rounded-md">閒置</span>`;
                    if (userBet) betHtml = `<span class="px-2.5 py-1 rounded-md text-xs font-bold bg-white/60 text-liquid-blue border border-blue-100 shadow-sm">選 ${userBet.option}</span>`;

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/40 transition-colors";
                    tr.innerHTML = `
                        <td class="py-3 px-2 flex flex-col gap-0.5">
                            <div class="font-bold text-sm text-gray-700 flex items-center gap-2">
                                ${index === 0 ? '<i class="fas fa-crown text-yellow-500 text-xs drop-shadow-sm"></i>' : ''}
                                ${u.robloxId}
                            </div>
                            <span class="text-[10px] text-liquid-gray font-medium"><i class="fas fa-box-open mr-1"></i>${u.skinBox || '未選擇'}</span>
                        </td>
                        <td class="py-3 px-2 text-sm font-black text-gray-800">${u.coins || 0}</td>
                        <td class="py-3 px-2">${betHtml}</td>
                        <td class="py-3 px-2 text-right">
                            <div class="flex items-center justify-end gap-1">
                                <button class="btn-add-coins text-green-500 hover:text-green-600 hover:bg-white/50 p-1.5 rounded-lg transition-all" data-uid="${u.uid}" title="調整金幣"><i class="fas fa-plus-circle text-sm"></i></button>
                                <button class="btn-reset-coins text-red-400 hover:text-red-600 hover:bg-white/50 p-1.5 rounded-lg transition-all" data-uid="${u.uid}" title="歸零"><i class="fas fa-trash-can text-sm"></i></button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.querySelectorAll('.btn-reset-coins').forEach(btn => btn.addEventListener('click', (e) => {
                    const uid = e.currentTarget.getAttribute('data-uid');
                    const u = usersData.find(x => x.uid === uid);
                    if(u) showConfirm(`清空 ${u.robloxId} 的金幣？`, async () => {
                        await updateDoc(doc(db, COL_USERS, uid), { coins: 0 });
                        showToast("已清空", "success");
                    });
                }));

                document.querySelectorAll('.btn-add-coins').forEach(btn => btn.addEventListener('click', (e) => {
                    const uid = e.currentTarget.getAttribute('data-uid');
                    const u = usersData.find(x => x.uid === uid);
                    if(u) showInputModal(`修改 ${u.robloxId} 金幣`, "輸入增減數量(如: 5 或 -2)", async (val) => {
                        const amount = parseInt(val);
                        if (!isNaN(amount)) {
                            const newCoins = (u.coins || 0) + amount;
                            await updateDoc(doc(db, COL_USERS, uid), { coins: newCoins < 0 ? 0 : newCoins });
                            showToast("金幣已更新", "success");
                        } else if (val.trim() !== "") showToast("無效的數字", "error");
                    });
                }));
            }
        }

        document.getElementById('btn-start-bet').addEventListener('click', async () => {
            const title = document.getElementById('host-title').value;
            const optA = document.getElementById('host-optA').value;
            const optB = document.getElementById('host-optB').value;
            if (!title || !optA || !optB) return showToast("欄位不可為空", 'warning');

            const deletePromises = betsData.map(bet => deleteDoc(doc(db, COL_BETS, bet.id)));
            await Promise.all(deletePromises);

            await setDoc(doc(db, COL_STATE, 'current'), {
                title, optionA: optA, optionB: optB,
                status: 'betting', startTime: Date.now(), result: null
            });
            showToast("押注開始", "success");
        });

        const resolveBet = async (winnerOption) => {
            const winnerText = winnerOption === 'A' ? gameState.optionA : gameState.optionB;
            showConfirm(`『${winnerText}』獲勝？`, async () => {
                try {
                    await updateDoc(doc(db, COL_STATE, 'current'), { status: 'resolved', result: winnerOption });
                    let winnersCount = 0;
                    for (const bet of betsData) {
                        const isTimeValid = (bet.betTime - gameState.startTime) <= 11000;
                        if (bet.option === winnerOption && isTimeValid) {
                            const winner = usersData.find(u => u.uid === bet.uid);
                            if (winner) {
                                await updateDoc(doc(db, COL_USERS, bet.uid), { coins: (winner.coins || 0) + 1 });
                                winnersCount++;
                            }
                        }
                    }
                    showToast(`結算完成，${winnersCount} 人獲勝`, "success");
                } catch (err) { showToast("錯誤", "error"); }
            });
        };

        document.getElementById('btn-resolve-a').addEventListener('click', () => resolveBet('A'));
        document.getElementById('btn-resolve-b').addEventListener('click', () => resolveBet('B'));

        // --- 用戶綁定介面 (包含皮膚箱選擇) ---
        
        // 皮膚箱按鈕點擊邏輯
        const skinBoxBtns = document.querySelectorAll('.skin-box-option');
        skinBoxBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 重置所有按鈕樣式
                skinBoxBtns.forEach(b => {
                    b.classList.remove('bg-blue-50', 'border-liquid-blue', 'text-liquid-blue', 'shadow-sm');
                    b.classList.add('bg-white/60', 'border-transparent', 'text-gray-500');
                    b.querySelector('i').classList.remove('fa-box-open');
                    b.querySelector('i').classList.add('fa-box');
                });
                
                // 套用選取樣式
                const currentBtn = e.currentTarget;
                currentBtn.classList.add('bg-blue-50', 'border-liquid-blue', 'text-liquid-blue', 'shadow-sm');
                currentBtn.classList.remove('bg-white/60', 'border-transparent', 'text-gray-500');
                currentBtn.querySelector('i').classList.remove('fa-box');
                currentBtn.querySelector('i').classList.add('fa-box-open');
                
                selectedSkinBox = currentBtn.getAttribute('data-box');
            });
        });

        document.getElementById('btn-bind').addEventListener('click', async () => {
            const input = document.getElementById('input-roblox').value.trim();
            const errDiv = document.getElementById('bind-error');
            const errText = document.getElementById('bind-error-text');
            errDiv.classList.add('hidden');
            if (!input) { errText.textContent = "請輸入 ID"; return errDiv.classList.remove('hidden'); }
            if (usersData.some(u => u.robloxId.toLowerCase() === input.toLowerCase())) {
                errText.textContent = "ID 已被使用"; return errDiv.classList.remove('hidden');
            }
            try {
                // 將 selectedSkinBox 一併寫入資料庫
                await setDoc(doc(db, COL_USERS, currentUser.uid), { 
                    uid: currentUser.uid, 
                    email: currentUser.email, 
                    robloxId: input, 
                    coins: 0,
                    skinBox: selectedSkinBox 
                });
                showToast("綁定成功", "success");
            } catch (err) { errText.textContent = "網路錯誤 (請確認 Firestore Rules)"; errDiv.classList.remove('hidden'); }
        });

        // --- 客戶端更新邏輯 ---
        function updateClientUIFromTimer() {
            if (currentUser?.email === ADMIN_EMAIL || !myData) return;
            const timeSpan = document.getElementById('client-time-left');
            const timeProgress = document.getElementById('time-progress');
            
            if (timeSpan) {
                timeSpan.textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
                if (timeLeft <= 3) timeSpan.classList.add('text-red-500');
                else timeSpan.classList.remove('text-red-500');
            }
            if (timeProgress) {
                timeProgress.style.width = `${(timeLeft / 10) * 100}%`;
                if (timeLeft <= 3) timeProgress.classList.replace('bg-liquid-text', 'bg-red-500');
            }
            
            if (timeLeft <= 0) {
                document.querySelectorAll('.btn-bet').forEach(b => {
                    b.disabled = true; 
                    b.classList.add('cursor-not-allowed');
                    b.classList.remove('hover:-translate-y-1', 'btn-press', 'shadow-md', 'hover:shadow-lg');
                });
            }
        }

        function renderClient() {
            document.getElementById('client-roblox-id').textContent = myData.robloxId;
            document.getElementById('client-coins').textContent = myData.coins || 0;
            
            // 顯示選擇的皮膚箱
            const skinBoxEl = document.getElementById('client-skin-box');
            if (myData.skinBox) {
                skinBoxEl.textContent = myData.skinBox;
                skinBoxEl.classList.remove('hidden');
            } else {
                skinBoxEl.classList.add('hidden');
            }
            
            const sortedUsersDesc = [...usersData].sort((a, b) => (b.coins || 0) - (a.coins || 0));
            const myRankIndex = sortedUsersDesc.findIndex(u => u.uid === currentUser.uid);
            document.getElementById('client-rank-badge').textContent = `#${myRankIndex + 1}`;

            const arena = document.getElementById('client-arena-content');
            const myBet = betsData.find(b => b.uid === currentUser.uid);

            if (!gameState || gameState.status === 'idle') {
                arena.innerHTML = `
                    <div class="liquid-glass rounded-[2rem] p-12 text-center mt-6">
                        <div class="w-16 h-16 bg-white/40 border border-white rounded-full flex items-center justify-center mx-auto mb-4 animate-liquid-morph">
                            <i class="fas fa-droplet text-2xl text-gray-400"></i>
                        </div>
                        <h2 class="text-xl font-bold mb-1 text-gray-700">等待中</h2>
                        <p class="text-sm text-liquid-gray">等待對決開始...</p>
                    </div>`;
                return;
            }

            if (gameState.status === 'betting') {
                let content = `
                    <div class="liquid-glass-heavy rounded-[2rem] p-6 sm:p-10 text-center relative overflow-hidden mt-6 shadow-sm border-t border-white">
                        <p class="text-[11px] font-bold text-liquid-blue uppercase tracking-[0.2em] mb-3">對決中</p>
                        <h2 class="text-3xl sm:text-4xl font-black text-gray-800 tracking-tight mb-8">${gameState.title}</h2>
                        
                        <div class="max-w-[200px] mx-auto mb-10">
                            <div class="flex justify-between items-center mb-2 text-[11px] font-bold">
                                <span class="text-gray-500 uppercase tracking-wider">剩餘時間</span>
                                <span id="client-time-left" class="font-mono text-base tracking-tight bg-white px-2 py-0.5 rounded-md shadow-sm border border-gray-100">00:${timeLeft.toString().padStart(2, '0')}</span>
                            </div>
                            <div class="w-full bg-gray-200/60 rounded-full h-2 overflow-hidden shadow-inner">
                                <div id="time-progress" class="bg-liquid-text h-2 rounded-full transition-all duration-100 ease-linear" style="width: ${(timeLeft/10)*100}%"></div>
                            </div>
                        </div>`;

                const btnA_selected = myBet && myBet.option === 'A';
                const btnB_selected = myBet && myBet.option === 'B';
                
                const disableInteraction = (timeLeft <= 0 || myBet);
                const classBase = "rounded-3xl p-6 transition-all flex flex-col items-center justify-center gap-2 relative overflow-hidden";
                const classInteract = disableInteraction ? "cursor-not-allowed" : "hover:-translate-y-1 shadow-md hover:shadow-lg btn-press";
                
                const styleA = btnA_selected ? "ring-4 ring-green-400 bg-white shadow-lg scale-105" : "bg-white/80 border border-white";
                const styleB = btnB_selected ? "ring-4 ring-green-400 bg-white shadow-lg scale-105" : "bg-white/80 border border-white";

                content += `
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button class="btn-bet ${classBase} ${styleA} ${classInteract}" data-opt="A" ${disableInteraction ? 'disabled' : ''}>
                            <span class="w-10 h-10 rounded-full ${btnA_selected ? 'bg-green-100 text-green-600' : 'bg-blue-50 text-blue-500'} flex items-center justify-center text-sm font-black mb-1 transition-colors">A</span>
                            <span class="text-2xl font-black text-gray-800">${gameState.optionA}</span>
                            ${btnA_selected ? '<div class="absolute top-3 right-3 text-green-500 text-lg"><i class="fas fa-check-circle"></i></div>' : ''}
                        </button>
                        <button class="btn-bet ${classBase} ${styleB} ${classInteract}" data-opt="B" ${disableInteraction ? 'disabled' : ''}>
                            <span class="w-10 h-10 rounded-full ${btnB_selected ? 'bg-green-100 text-green-600' : 'bg-purple-50 text-purple-500'} flex items-center justify-center text-sm font-black mb-1 transition-colors">B</span>
                            <span class="text-2xl font-black text-gray-800">${gameState.optionB}</span>
                            ${btnB_selected ? '<div class="absolute top-3 right-3 text-green-500 text-lg"><i class="fas fa-check-circle"></i></div>' : ''}
                        </button>
                    </div>
                </div>`;

                arena.innerHTML = content;
                
                if (!myBet) {
                    document.querySelectorAll('.btn-bet').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            if (timeLeft <= 0) return;
                            try {
                                await setDoc(doc(db, COL_BETS, currentUser.uid), { uid: currentUser.uid, robloxId: myData.robloxId, option: e.currentTarget.getAttribute('data-opt'), betTime: Date.now() });
                                showToast("押注成功", "success");
                            } catch (err) { showToast("錯誤", "error"); }
                        });
                    });
                }
                return;
            }

            if (gameState.status === 'resolved') {
                const winnerText = gameState.result === 'A' ? gameState.optionA : gameState.optionB;
                let resultHtml = `<div class="mt-6 text-[11px] font-bold text-gray-400 uppercase tracking-widest py-2 px-4 bg-white/50 border border-white rounded-full inline-block">未參與</div>`;
                
                if (myBet) {
                    if (myBet.option === gameState.result) {
                        resultHtml = `
                        <div class="mt-8 p-6 bg-gradient-to-br from-green-50 to-emerald-100 border border-white rounded-[2rem] animate-scale-in shadow-sm">
                            <p class="text-green-600 font-black text-xl flex flex-col items-center justify-center gap-2">
                                <i class="fas fa-gem text-3xl mb-1"></i> 勝利
                            </p>
                        </div>`;
                    } else {
                        resultHtml = `
                        <div class="mt-8 p-6 bg-white/50 border border-white rounded-[2rem] animate-scale-in">
                            <p class="text-gray-500 font-bold text-lg flex flex-col items-center justify-center gap-2">
                                <i class="fas fa-face-frown text-3xl mb-1 opacity-50"></i> 失敗
                            </p>
                        </div>`;
                    }
                }
                
                arena.innerHTML = `
                    <div class="liquid-glass rounded-[2rem] p-10 text-center mt-6">
                        <p class="text-[11px] font-bold text-liquid-blue uppercase tracking-widest mb-4">結果</p>
                        <h2 class="text-4xl font-black text-gray-800 tracking-tight mb-2">${winnerText}</h2>
                        ${resultHtml}
                    </div>`;
            }
        }
    </script>
</body>
</html>
