<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實時對決 | Liquid Minimal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] 
                    },
                    colors: {
                        liquid: {
                            text: '#1d1d1f',
                            gray: '#86868b',
                            blue: '#0071e3',
                            blueHover: '#0077ED',
                            bg: '#f5f5f7'
                        }
                    },
                    animation: {
                        'liquid-morph': 'morph 8s ease-in-out infinite',
                        'blob': 'blob 15s infinite alternate',
                        'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'scale-in': 'scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards'
                    },
                    keyframes: {
                        morph: {
                            '0%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' },
                            '50%': { borderRadius: '30% 70% 70% 30% / 30% 30% 70% 70%' },
                            '100%': { borderRadius: '60% 40% 30% 70% / 60% 30% 70% 40%' }
                        },
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '100%': { transform: 'translate(40px, -40px) scale(1.1)' }
                        },
                        fadeIn: { '0%': { opacity: 0, transform: 'translateY(10px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                        scaleIn: { '0%': { opacity: 0, transform: 'scale(0.95)' }, '100%': { opacity: 1, transform: 'scale(1)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            background-color: #f4f6f9;
            color: #1d1d1f;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* 核心：液態毛玻璃效果 (帶表面高光) */
        .liquid-glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.3) 100%);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            border-left: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
        }
        
        .liquid-glass-heavy {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 255, 0.6) 100%);
            backdrop-filter: saturate(200%) blur(30px);
            -webkit-backdrop-filter: saturate(200%) blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-top: 1px solid rgba(255, 255, 255, 1);
            border-left: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        /* 簡約輸入框 */
        .liquid-input {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .liquid-input:focus {
            background: rgba(255, 255, 255, 0.95);
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
            outline: none;
        }

        /* 按鈕縮放回饋 */
        .btn-press { transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.2s ease; }
        .btn-press:active { transform: scale(0.96); }

        /* Toast 動畫 */
        @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-animate { animation: slideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen relative font-sans">

    <!-- 動態液態背景 (變形流動) -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <!-- 左上角大塊液態 -->
        <div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-gradient-to-tr from-pink-300/50 to-purple-300/50 mix-blend-multiply filter blur-[80px] animate-liquid-morph" style="animation-duration: 12s;"></div>
        <!-- 右側藍色液態 -->
        <div class="absolute top-[20%] right-[-10%] w-[50%] h-[50%] bg-gradient-to-bl from-blue-300/50 to-cyan-200/50 mix-blend-multiply filter blur-[80px] animate-liquid-morph" style="animation-duration: 15s; animation-delay: -5s;"></div>
        <!-- 底部黃/粉液態 -->
        <div class="absolute bottom-[-10%] left-[20%] w-[60%] h-[50%] bg-gradient-to-t from-yellow-200/50 to-pink-200/50 mix-blend-multiply filter blur-[80px] animate-liquid-morph" style="animation-duration: 18s; animation-delay: -2s;"></div>
    </div>

    <!-- 浮島式 Navbar (移至右上角) -->
    <header id="navbar" class="hidden fixed top-4 right-4 sm:top-6 sm:right-6 z-40 liquid-glass px-4 py-2 sm:px-5 sm:py-2.5 rounded-full flex items-center gap-4 animate-fade-in transition-all">
        <div class="flex items-center gap-2">
            <i class="fas fa-droplet text-liquid-blue text-lg"></i>
            <h1 id="nav-title" class="text-sm font-semibold tracking-wide hidden sm:block">實時對決</h1>
        </div>
        <div class="w-px h-4 bg-gray-300 hidden sm:block"></div>
        <div class="flex items-center gap-3">
            <div id="nav-email" class="text-xs font-medium text-liquid-gray hidden md:block max-w-[120px] truncate"></div>
            <button id="btn-logout" class="bg-gray-100 hover:bg-gray-200 text-gray-700 w-8 h-8 rounded-full flex items-center justify-center transition-colors btn-press" title="登出">
                <i class="fas fa-sign-out-alt text-sm"></i>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-5 sm:p-8 relative z-10 pt-24 pb-20">
        
        <!-- 1. Loading View -->
        <div id="view-loading" class="flex flex-col items-center justify-center min-h-[70vh] animate-fade-in">
            <div class="w-12 h-12 relative mb-6">
                <!-- 液態風格的 Loading -->
                <div class="absolute inset-0 border-[3px] border-gray-200 rounded-full"></div>
                <div class="absolute inset-0 border-[3px] border-transparent border-t-liquid-blue rounded-full animate-spin"></div>
            </div>
            <p id="loading-text" class="text-sm font-medium text-liquid-gray tracking-wide">載入流體空間...</p>
        </div>

        <!-- 2. Login View -->
        <div id="view-login" class="hidden flex flex-col items-center justify-center min-h-[70vh]">
            <div class="liquid-glass-heavy p-10 sm:p-14 rounded-[2rem] max-w-md w-full text-center animate-scale-in">
                <div class="mb-8">
                    <!-- 移除Apple標誌，使用液態水滴標誌 -->
                    <div class="w-20 h-20 bg-gradient-to-br from-blue-400 to-purple-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-500/20 animate-liquid-morph">
                        <i class="fas fa-droplet text-3xl text-white"></i>
                    </div>
                    <h1 class="text-3xl font-bold tracking-tight mb-3">準備登入</h1>
                    <p class="text-liquid-gray text-sm">使用 Google 進入液態極簡大廳</p>
                </div>
                
                <button id="btn-login" class="w-full bg-white/80 backdrop-blur-md border border-gray-200 text-black font-semibold py-3.5 px-6 rounded-2xl flex items-center justify-center gap-3 shadow-sm hover:bg-white transition-all btn-press mb-6">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/><path fill="none" d="M1 1h22v22H1z"/></svg>
                    Google 快速登入
                </button>
            </div>
        </div>

        <!-- 3. Bind Roblox View -->
        <div id="view-bind" class="hidden max-w-md mx-auto mt-12 animate-scale-in">
            <div class="liquid-glass-heavy p-10 rounded-[2rem] text-center">
                <div class="w-16 h-16 bg-white/50 border border-white rounded-full flex items-center justify-center mx-auto mb-6 shadow-sm">
                    <i class="fas fa-user-tag text-2xl text-liquid-blue"></i>
                </div>
                <h2 class="text-2xl font-bold mb-3 tracking-tight">最後一步驟</h2>
                <p class="text-liquid-gray text-sm mb-8">綁定您的 Roblox ID 以開始參與對決。</p>
                
                <div id="bind-error" class="hidden bg-red-50/80 backdrop-blur-md text-red-500 px-4 py-3 rounded-xl mb-6 text-sm font-medium border border-red-100 text-left">
                    <i class="fas fa-exclamation-circle mr-1"></i> <span id="bind-error-text"></span>
                </div>
                
                <div class="mb-8 text-left">
                    <input type="text" id="input-roblox" placeholder="輸入 Roblox ID" class="w-full liquid-input rounded-2xl px-5 py-4 font-medium text-lg placeholder-gray-400" />
                </div>
                
                <button id="btn-bind" class="w-full bg-liquid-text hover:bg-black text-white font-semibold py-4 rounded-2xl transition-colors btn-press text-lg shadow-lg">
                    確認綁定
                </button>
            </div>
        </div>

        <!-- 4. Host Dashboard View -->
        <div id="view-host" class="hidden space-y-8 animate-fade-in">
            <div class="text-left mb-8">
                <h2 class="text-3xl font-bold tracking-tight mb-1 text-gray-800">控制中心</h2>
                <p class="text-liquid-gray text-sm">管理對決狀態與玩家數據</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- 發起對決卡片 -->
                <div class="liquid-glass rounded-[2rem] p-8">
                    <h3 class="text-lg font-semibold mb-6 flex items-center gap-2"><i class="fas fa-bolt text-yellow-500"></i> 發起新對決</h3>
                    <div class="space-y-5">
                        <div>
                            <input type="text" id="host-title" placeholder="輸入押注標題 (例：冠軍賽預測)" class="w-full liquid-input rounded-xl px-4 py-3.5 font-medium" />
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="host-optA" placeholder="選項 A" class="w-full liquid-input rounded-xl px-4 py-3.5 font-medium text-center" />
                            <input type="text" id="host-optB" placeholder="選項 B" class="w-full liquid-input rounded-xl px-4 py-3.5 font-medium text-center" />
                        </div>
                        <button id="btn-start-bet" class="w-full bg-liquid-blue hover:bg-liquid-blueHover text-white font-semibold py-3.5 rounded-xl transition-colors btn-press mt-2 shadow-md shadow-blue-500/30">
                            發佈押注 (10秒)
                        </button>
                    </div>
                </div>

                <!-- 當前狀態卡片 -->
                <div class="liquid-glass rounded-[2rem] p-8 flex flex-col justify-between">
                    <div>
                        <h3 class="text-lg font-semibold mb-6 flex items-center gap-2"><i class="fas fa-satellite-dish text-purple-500"></i> 當前狀態</h3>
                        <div id="host-state-content" class="min-h-[120px]">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                    <div id="host-resolve-panel" class="hidden mt-6 pt-6 border-t border-white/40">
                        <p class="text-xs font-semibold text-liquid-gray mb-4 text-center tracking-widest uppercase">點擊勝利方進行結算</p>
                        <div class="grid grid-cols-2 gap-4">
                            <button id="btn-resolve-a" class="bg-white/60 hover:bg-white text-black py-3 rounded-xl font-semibold transition-all shadow-sm btn-press border border-white">
                                A 獲勝
                            </button>
                            <button id="btn-resolve-b" class="bg-white/60 hover:bg-white text-black py-3 rounded-xl font-semibold transition-all shadow-sm btn-press border border-white">
                                B 獲勝
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 玩家列表 -->
            <div class="liquid-glass rounded-[2rem] p-8 overflow-hidden">
                <h3 class="text-lg font-semibold mb-6 flex items-center gap-2"><i class="fas fa-users text-green-500"></i> 大廳玩家</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="border-b border-gray-300/30 text-liquid-gray text-xs uppercase tracking-wider">
                                <th class="py-3 px-2 font-medium">玩家 ID</th>
                                <th class="py-3 px-2 font-medium">金幣</th>
                                <th class="py-3 px-2 font-medium">狀態</th>
                                <th class="py-3 px-2 font-medium text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="host-table-body" class="divide-y divide-gray-300/20">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 5. Client Dashboard View -->
        <div id="view-client" class="hidden max-w-2xl mx-auto space-y-6 animate-fade-in">
            <!-- 頂部資訊卡 (液態漂浮感) -->
            <div class="liquid-glass-heavy rounded-3xl p-6 flex items-center justify-between shadow-lg shadow-gray-200/50">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-white/60 border border-white rounded-full flex items-center justify-center text-xl text-gray-700 shadow-sm">
                        <i class="fas fa-ghost"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-liquid-gray font-bold uppercase tracking-widest mb-0.5">Player</p>
                        <p id="client-roblox-id" class="text-lg font-bold tracking-tight text-gray-800">-</p>
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-liquid-gray font-bold uppercase tracking-widest mb-0.5">Coins</p>
                    <div class="flex items-center gap-1.5 justify-end">
                        <span id="client-coins" class="text-2xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-yellow-500 to-orange-400">0</span>
                        <i class="fas fa-coins text-yellow-500"></i>
                    </div>
                </div>
            </div>

            <!-- 押注主區域 -->
            <div id="client-arena-content" class="w-full">
                <!-- Injected by JS -->
            </div>
        </div>
    </main>

    <!-- Global Toast Container -->
    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-3 pointer-events-none w-full max-w-sm px-4"></div>

    <!-- Liquid Custom Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-gray-900/20 backdrop-blur-sm transition-opacity"></div>
        <div class="liquid-glass-heavy rounded-3xl p-6 max-w-[300px] w-full shadow-2xl relative z-10 animate-scale-in text-center">
            <h3 class="text-lg font-bold mb-2">確認執行</h3>
            <p id="confirm-message" class="text-sm text-gray-600 mb-6 leading-relaxed"></p>
            <div class="flex flex-col gap-3">
                <button id="btn-confirm-ok" class="w-full py-3.5 bg-red-500 hover:bg-red-600 text-white rounded-xl font-semibold transition-colors btn-press shadow-md shadow-red-500/20">確認</button>
                <button id="btn-confirm-cancel" class="w-full py-3.5 bg-white/60 hover:bg-white text-gray-700 rounded-xl font-semibold border border-white transition-colors btn-press">取消</button>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAjpVHUYvBYh1jOylLlX9gHrTLibEFjF2I",
            authDomain: "realtimebettingapp.firebaseapp.com",
            projectId: "realtimebettingapp",
            storageBucket: "realtimebettingapp.firebasestorage.app",
            messagingSenderId: "824284688785",
            appId: "1:824284688785:web:18a9c711c59a4017602a30",
            measurementId: "G-WZC238ZGBV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const ADMIN_EMAIL = 'pixel9profold20240813@gmail.com';
        const COL_USERS = 'betting_users';
        const COL_STATE = 'betting_state';
        const COL_BETS = 'betting_bets';

        let currentUser = null, usersData = [], myData = null, gameState = null, betsData = [];
        let timerInterval = null, timeLeft = 0;
        let unsubUsers, unsubState, unsubBets;

        // --- Toast & Confirm ---
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            toast.className = `liquid-glass-heavy px-5 py-3 rounded-full flex items-center gap-3 toast-animate pointer-events-auto font-medium text-sm shadow-xl mx-auto w-max`;
            
            let icon = '';
            if(type === 'success') icon = '<i class="fas fa-check-circle text-green-500 text-lg"></i>';
            else if(type === 'error') icon = '<i class="fas fa-exclamation-circle text-red-500 text-lg"></i>';
            else if(type === 'warning') icon = '<i class="fas fa-exclamation-triangle text-yellow-500 text-lg"></i>';
            else icon = '<i class="fas fa-info-circle text-liquid-blue text-lg"></i>';

            toast.innerHTML = `${icon} <span class="text-gray-800 tracking-wide">${message}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-10px)';
                toast.style.transition = 'all 0.4s ease';
                setTimeout(() => toast.remove(), 400);
            }, 2500);
        }

        let confirmCallback = null;
        function showConfirm(message, callback) {
            document.getElementById('confirm-message').textContent = message;
            document.getElementById('confirm-modal').classList.remove('hidden');
            confirmCallback = callback;
        }

        document.getElementById('btn-confirm-cancel').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            confirmCallback = null;
        });
        document.getElementById('btn-confirm-ok').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (confirmCallback) confirmCallback();
            confirmCallback = null;
        });

        function showView(viewId) {
            ['view-loading', 'view-login', 'view-bind', 'view-host', 'view-client'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            if (viewId) document.getElementById(viewId).classList.remove('hidden');
        }

        // --- Auth 邏輯 ---
        showView('view-loading'); 

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (!user) {
                clearListeners();
                document.getElementById('navbar').classList.add('hidden');
                showView('view-login');
            } else {
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('nav-email').textContent = user.email;
                if (user.email === ADMIN_EMAIL) {
                    document.getElementById('nav-title').textContent = '控制中心';
                }
                setupRealtimeListeners();
            }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            document.getElementById('loading-text').textContent = "正在進入...";
            showView('view-loading');
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch((error) => {
                showView('view-login');
                if(error.code !== 'auth/popup-closed-by-user') showToast("登入發生錯誤", "error");
            });
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // --- 資料庫監聽 ---
        function setupRealtimeListeners() {
            unsubUsers = onSnapshot(collection(db, COL_USERS), (snap) => {
                usersData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                myData = usersData.find(u => u.uid === currentUser.uid);
                renderLogic();
            });

            unsubState = onSnapshot(collection(db, COL_STATE), (snap) => {
                const current = snap.docs.find(d => d.id === 'current');
                gameState = current ? current.data() : null;
                handleTimer();
                renderLogic();
            });

            unsubBets = onSnapshot(collection(db, COL_BETS), (snap) => {
                betsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderLogic();
            });
        }

        function clearListeners() {
            if (unsubUsers) unsubUsers();
            if (unsubState) unsubState();
            if (unsubBets) unsubBets();
            if (timerInterval) clearInterval(timerInterval);
        }

        function renderLogic() {
            if (!currentUser) return;
            if (currentUser.email === ADMIN_EMAIL) {
                showView('view-host');
                renderHost();
            } else {
                if (!myData) {
                    showView('view-bind');
                } else {
                    showView('view-client');
                    renderClient();
                }
            }
        }

        // --- 主持端介面 ---
        function renderHost() {
            const stateDiv = document.getElementById('host-state-content');
            const resolvePanel = document.getElementById('host-resolve-panel');
            
            if (!gameState) {
                stateDiv.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-400 py-6"><i class="fas fa-water text-4xl mb-3 opacity-40"></i><p class="text-sm font-medium">水面平靜，尚未發起對決</p></div>`;
                resolvePanel.classList.add('hidden');
            } else {
                let statusHtml = '';
                if (gameState.status === 'betting') {
                    statusHtml = `<span class="text-sm font-bold text-liquid-blue flex items-center gap-1.5"><i class="fas fa-circle-notch fa-spin"></i> 押注中 (${timeLeft}s)</span>`;
                    resolvePanel.classList.remove('hidden');
                } else {
                    const winOpt = gameState.result === 'A' ? gameState.optionA : gameState.optionB;
                    statusHtml = `<span class="text-sm font-bold text-gray-500 flex items-center gap-1.5"><i class="fas fa-flag-checkered"></i> 結算完畢 (${winOpt} 勝)</span>`;
                    resolvePanel.classList.add('hidden');
                }

                stateDiv.innerHTML = `
                    <div class="bg-white/40 border border-white rounded-2xl p-5 mb-4 text-center shadow-sm">
                        <h4 class="text-xl font-bold text-gray-800 tracking-tight mb-3">${gameState.title}</h4>
                        <div class="flex justify-center items-center gap-3 text-sm font-bold">
                            <span class="px-4 py-2 bg-white/70 rounded-xl text-gray-700 w-1/2 truncate shadow-sm border border-white">${gameState.optionA}</span>
                            <span class="text-gray-400 text-xs">VS</span>
                            <span class="px-4 py-2 bg-white/70 rounded-xl text-gray-700 w-1/2 truncate shadow-sm border border-white">${gameState.optionB}</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between px-1">
                        ${statusHtml}
                        <span class="text-xs font-bold text-liquid-gray uppercase tracking-widest">${betsData.length} 參與</span>
                    </div>
                `;
            }

            const tbody = document.getElementById('host-table-body');
            tbody.innerHTML = '';
            const sortedUsers = [...usersData].sort((a, b) => (b.coins || 0) - (a.coins || 0));
            
            if (sortedUsers.length === 0) {
                tbody.innerHTML = `<tr><td colSpan="4" class="py-8 text-center text-liquid-gray text-sm">暫無玩家加入</td></tr>`;
            } else {
                sortedUsers.forEach((u, index) => {
                    const userBet = betsData.find(b => b.uid === u.uid);
                    let betHtml = `<span class="text-gray-400/80 text-xs font-medium border border-gray-300/50 px-2 py-1 rounded-md">閒置</span>`;
                    if (userBet) {
                        betHtml = `<span class="px-2.5 py-1 rounded-md text-xs font-bold bg-white/60 text-liquid-blue border border-blue-100 shadow-sm">選 ${userBet.option}</span>`;
                    }
                    
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-white/40 transition-colors";
                    tr.innerHTML = `
                        <td class="py-3 px-2 font-bold text-sm text-gray-700 flex items-center gap-2">
                            ${index === 0 ? '<i class="fas fa-crown text-yellow-500 text-xs drop-shadow-sm"></i>' : ''}
                            ${u.robloxId}
                        </td>
                        <td class="py-3 px-2 text-sm font-black text-gray-800">${u.coins || 0}</td>
                        <td class="py-3 px-2">${betHtml}</td>
                        <td class="py-3 px-2 text-right">
                            <button class="btn-reset-coins text-red-400 hover:text-red-600 hover:bg-white/50 p-1.5 rounded-lg transition-all" data-uid="${u.uid}" title="金幣歸零">
                                <i class="fas fa-trash-can text-sm"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.querySelectorAll('.btn-reset-coins').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const uid = e.currentTarget.getAttribute('data-uid');
                        const u = usersData.find(x => x.uid === uid);
                        if(u) {
                            showConfirm(`確定要清空「${u.robloxId}」的金幣？`, async () => {
                                await updateDoc(doc(db, COL_USERS, uid), { coins: 0 });
                                showToast("已清空", "success");
                            });
                        }
                    });
                });
            }
        }

        document.getElementById('btn-start-bet').addEventListener('click', async () => {
            const title = document.getElementById('host-title').value;
            const optA = document.getElementById('host-optA').value;
            const optB = document.getElementById('host-optB').value;
            if (!title || !optA || !optB) return showToast("所有欄位都是必填的", 'warning');

            const deletePromises = betsData.map(bet => deleteDoc(doc(db, COL_BETS, bet.id)));
            await Promise.all(deletePromises);

            await setDoc(doc(db, COL_STATE, 'current'), {
                title, optionA: optA, optionB: optB,
                status: 'betting', startTime: Date.now(), result: null
            });
            showToast("押注開始流動", "success");
        });

        const resolveBet = async (winnerOption) => {
            const winnerText = winnerOption === 'A' ? gameState.optionA : gameState.optionB;
            showConfirm(`確認『${winnerText}』獲得勝利？`, async () => {
                try {
                    await updateDoc(doc(db, COL_STATE, 'current'), { status: 'resolved', result: winnerOption });
                    let winnersCount = 0;
                    for (const bet of betsData) {
                        const isTimeValid = (bet.betTime - gameState.startTime) <= 11000;
                        if (bet.option === winnerOption && isTimeValid) {
                            const winner = usersData.find(u => u.uid === bet.uid);
                            if (winner) {
                                await updateDoc(doc(db, COL_USERS, bet.uid), { coins: (winner.coins || 0) + 1 });
                                winnersCount++;
                            }
                        }
                    }
                    showToast(`結算完成，${winnersCount} 人獲勝`, "success");
                } catch (err) { showToast("系統錯誤", "error"); }
            });
        };

        document.getElementById('btn-resolve-a').addEventListener('click', () => resolveBet('A'));
        document.getElementById('btn-resolve-b').addEventListener('click', () => resolveBet('B'));

        // --- 用戶綁定介面 ---
        document.getElementById('btn-bind').addEventListener('click', async () => {
            const input = document.getElementById('input-roblox').value.trim();
            const errDiv = document.getElementById('bind-error');
            const errText = document.getElementById('bind-error-text');
            errDiv.classList.add('hidden');
            if (!input) { errText.textContent = "ID不可為空"; return errDiv.classList.remove('hidden'); }
            if (usersData.some(u => u.robloxId.toLowerCase() === input.toLowerCase())) {
                errText.textContent = "此 ID 已被註冊"; return errDiv.classList.remove('hidden');
            }
            try {
                await setDoc(doc(db, COL_USERS, currentUser.uid), { uid: currentUser.uid, email: currentUser.email, robloxId: input, coins: 0 });
                showToast("註冊成功", "success");
            } catch (err) { errText.textContent = "網路異常"; errDiv.classList.remove('hidden'); }
        });

        // --- 計時器 ---
        function handleTimer() {
            if (timerInterval) clearInterval(timerInterval);
            if (gameState?.status === 'betting') {
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                    const remaining = 10 - elapsed;
                    if (remaining <= 0) { timeLeft = 0; clearInterval(timerInterval); } else { timeLeft = remaining; }
                    updateClientUIFromTimer();
                    if (currentUser && currentUser.email === ADMIN_EMAIL) renderHost();
                }, 100);
            } else { timeLeft = 0; }
        }

        function updateClientUIFromTimer() {
            if (currentUser?.email === ADMIN_EMAIL || !myData) return;
            const timeSpan = document.getElementById('client-time-left');
            const timeProgress = document.getElementById('time-progress');
            
            if (timeSpan) {
                timeSpan.textContent = `00:${timeLeft.toString().padStart(2, '0')}`;
                if (timeLeft <= 3) timeSpan.classList.add('text-red-500');
                else timeSpan.classList.remove('text-red-500');
            }
            if (timeProgress) {
                timeProgress.style.width = `${(timeLeft / 10) * 100}%`;
                if (timeLeft <= 3) timeProgress.classList.replace('bg-liquid-text', 'bg-red-500');
            }
            
            if (timeLeft <= 0) {
                document.querySelectorAll('.btn-bet').forEach(b => {
                    b.disabled = true; 
                    b.classList.add('opacity-40', 'cursor-not-allowed', 'scale-95');
                    b.classList.remove('hover:-translate-y-1', 'btn-press', 'shadow-md');
                });
            }
        }

        // --- 用戶主競技場 ---
        function renderClient() {
            document.getElementById('client-roblox-id').textContent = myData.robloxId;
            document.getElementById('client-coins').textContent = myData.coins || 0;
            const arena = document.getElementById('client-arena-content');
            const myBet = betsData.find(b => b.uid === currentUser.uid);

            if (!gameState || gameState.status === 'idle') {
                arena.innerHTML = `
                    <div class="liquid-glass rounded-[2rem] p-12 text-center mt-6">
                        <div class="w-16 h-16 bg-white/40 border border-white rounded-full flex items-center justify-center mx-auto mb-4 animate-liquid-morph">
                            <i class="fas fa-droplet text-2xl text-gray-400"></i>
                        </div>
                        <h2 class="text-xl font-bold mb-1 text-gray-700">等待發起</h2>
                        <p class="text-sm text-liquid-gray">請等待主持者開始新的對決</p>
                    </div>`;
                return;
            }

            if (gameState.status === 'betting') {
                let content = `
                    <div class="liquid-glass-heavy rounded-[2rem] p-6 sm:p-10 text-center relative overflow-hidden mt-6 shadow-sm border-t border-white">
                        <p class="text-[11px] font-bold text-liquid-blue uppercase tracking-[0.2em] mb-3">對決進行中</p>
                        <h2 class="text-3xl sm:text-4xl font-black text-gray-800 tracking-tight mb-8">${gameState.title}</h2>
                        
                        <div class="max-w-[200px] mx-auto mb-10">
                            <div class="flex justify-between items-center mb-2 text-[11px] font-bold">
                                <span class="text-gray-500 uppercase tracking-wider">剩餘時間</span>
                                <span id="client-time-left" class="font-mono text-base tracking-tight bg-white px-2 py-0.5 rounded-md shadow-sm border border-gray-100">00:${timeLeft.toString().padStart(2, '0')}</span>
                            </div>
                            <div class="w-full bg-gray-200/60 rounded-full h-2 overflow-hidden shadow-inner">
                                <div id="time-progress" class="bg-liquid-text h-2 rounded-full transition-all duration-100 ease-linear" style="width: ${(timeLeft/10)*100}%"></div>
                            </div>
                        </div>`;

                if (!myBet) {
                    const disableClass = timeLeft <= 0 ? "opacity-40 cursor-not-allowed scale-95" : "hover:-translate-y-1 shadow-md hover:shadow-lg btn-press";
                    content += `
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <button class="btn-bet bg-white/80 backdrop-blur-sm border border-white rounded-3xl p-6 transition-all flex flex-col items-center justify-center gap-2 ${disableClass}" data-opt="A">
                                <span class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-sm font-black text-blue-500 mb-1">A</span>
                                <span class="text-2xl font-black text-gray-800">${gameState.optionA}</span>
                            </button>
                            <button class="btn-bet bg-white/80 backdrop-blur-sm border border-white rounded-3xl p-6 transition-all flex flex-col items-center justify-center gap-2 ${disableClass}" data-opt="B">
                                <span class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center text-sm font-black text-purple-500 mb-1">B</span>
                                <span class="text-2xl font-black text-gray-800">${gameState.optionB}</span>
                            </button>
                        </div>
                    </div>`;
                    arena.innerHTML = content;
                    
                    document.querySelectorAll('.btn-bet').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            if (timeLeft <= 0) return;
                            try {
                                await setDoc(doc(db, COL_BETS, currentUser.uid), { uid: currentUser.uid, robloxId: myData.robloxId, option: e.currentTarget.getAttribute('data-opt'), betTime: Date.now() });
                                showToast("押注已送出", "success");
                            } catch (err) { showToast("下注失敗", "error"); }
                        });
                    });
                } else {
                    const chosenText = myBet.option === 'A' ? gameState.optionA : gameState.optionB;
                    arena.innerHTML = content + `
                        <div class="py-6 animate-scale-in">
                            <div class="w-16 h-16 bg-white border border-white text-green-500 rounded-full flex items-center justify-center text-2xl mx-auto mb-4 shadow-sm">
                                <i class="fas fa-check"></i>
                            </div>
                            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-widest mb-1">您的選擇</p>
                            <h3 class="text-2xl font-black text-gray-800">${chosenText}</h3>
                        </div>
                    </div>`;
                }
                return;
            }

            if (gameState.status === 'resolved') {
                const winnerText = gameState.result === 'A' ? gameState.optionA : gameState.optionB;
                let resultHtml = `<div class="mt-6 text-[11px] font-bold text-gray-400 uppercase tracking-widest py-2 px-4 bg-white/50 border border-white rounded-full inline-block">本局未參與</div>`;
                
                if (myBet) {
                    if (myBet.option === gameState.result) {
                        resultHtml = `
                        <div class="mt-8 p-6 bg-gradient-to-br from-green-50 to-emerald-100 border border-white rounded-[2rem] animate-scale-in shadow-sm">
                            <p class="text-green-600 font-black text-xl flex flex-col items-center justify-center gap-2">
                                <i class="fas fa-gem text-3xl mb-1"></i> 勝利！獲得金幣
                            </p>
                        </div>`;
                    } else {
                        resultHtml = `
                        <div class="mt-8 p-6 bg-white/50 border border-white rounded-[2rem] animate-scale-in">
                            <p class="text-gray-500 font-bold text-lg flex flex-col items-center justify-center gap-2">
                                <i class="fas fa-face-frown text-3xl mb-1 opacity-50"></i> 挑戰失敗
                            </p>
                        </div>`;
                    }
                }
                
                arena.innerHTML = `
                    <div class="liquid-glass rounded-[2rem] p-10 text-center mt-6">
                        <p class="text-[11px] font-bold text-liquid-blue uppercase tracking-widest mb-4">最終結果</p>
                        <h2 class="text-4xl font-black text-gray-800 tracking-tight mb-2">${winnerText}</h2>
                        <p class="text-sm font-bold text-gray-400">成為贏家</p>
                        ${resultHtml}
                    </div>`;
            }
        }
    </script>
</body>
</html>
