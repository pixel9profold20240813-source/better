<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實時對決押注系統</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hidden { display: none !important; }
        /* Toast Animation */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-animate { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen selection:bg-yellow-500 selection:text-black">

    <!-- Navbar -->
    <header id="navbar" class="hidden bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <i class="fas fa-trophy text-2xl text-yellow-500"></i>
            <h1 id="nav-title" class="text-xl font-bold tracking-wider">實時押注大廳</h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="nav-email" class="text-sm text-gray-400 hidden sm:block"></div>
            <button id="btn-logout" class="flex items-center gap-2 text-gray-400 hover:text-white transition">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8">
        <!-- 1. Loading View -->
        <div id="view-loading" class="flex flex-col items-center justify-center min-h-[80vh]">
            <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
            <p id="loading-text" class="text-gray-400">系統載入中...</p>
        </div>

        <!-- 2. Login View -->
        <div id="view-login" class="hidden flex flex-col items-center justify-center min-h-[80vh]">
            <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl max-w-md w-full text-center border border-gray-700">
                <i class="fas fa-trophy text-6xl text-yellow-500 mb-6"></i>
                <h1 class="text-3xl font-bold text-white mb-2">實時對決押注</h1>
                <p class="text-gray-400 mb-8">請使用 Google 帳號登入以繼續</p>
                <button id="btn-login" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2">
                    <i class="fab fa-google text-xl"></i> 使用 Google 登入
                </button>
            </div>
        </div>

        <!-- 3. Bind Roblox View -->
        <div id="view-bind" class="hidden max-w-md mx-auto mt-12 bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700">
            <h2 class="text-2xl font-bold mb-2">綁定 Roblox ID</h2>
            <p class="text-gray-400 text-sm mb-6">在開始押注前，請先綁定您的帳號。一經送出即無法更改。</p>
            <div id="bind-error" class="hidden bg-red-500/10 border border-red-500 text-red-500 px-4 py-3 rounded mb-4 flex items-center gap-2">
                <i class="fas fa-times-circle"></i> <span id="bind-error-text"></span>
            </div>
            <input type="text" id="input-roblox" placeholder="輸入您的 Roblox ID" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition mb-4" />
            <button id="btn-bind" class="w-full bg-blue-600 hover:bg-blue-700 font-bold py-3 rounded-lg transition">確認綁定</button>
        </div>

        <!-- 4. Host Dashboard View -->
        <div id="view-host" class="hidden space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Host Controls -->
                <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 shadow-xl">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-shield-alt text-purple-500"></i> 發起新押注</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">押注標題</label>
                            <input type="text" id="host-title" value="今天誰會贏？" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-purple-500 transition" />
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">選項 A</label>
                                <input type="text" id="host-optA" value="紅隊" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-purple-500 transition" />
                            </div>
                            <div>
                                <label class="block text-sm text-gray-400 mb-1">選項 B</label>
                                <input type="text" id="host-optB" value="藍隊" class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-purple-500 transition" />
                            </div>
                        </div>
                        <button id="btn-start-bet" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-lg transition mt-2">
                            發起押注 (倒數10秒)
                        </button>
                    </div>
                </div>

                <!-- Host State -->
                <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 shadow-xl flex flex-col justify-between">
                    <div>
                        <h2 class="text-xl font-bold mb-4 text-purple-400">當前狀態</h2>
                        <div id="host-state-content">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                    <div id="host-resolve-panel" class="hidden mt-6 pt-6 border-t border-gray-700">
                        <p class="text-sm text-gray-400 mb-3 text-center">請選擇最終獲勝的選項：</p>
                        <div class="grid grid-cols-2 gap-4">
                            <button id="btn-resolve-a" class="bg-green-600 hover:bg-green-700 py-2 rounded-lg font-bold transition">A 獲勝</button>
                            <button id="btn-resolve-b" class="bg-blue-600 hover:bg-blue-700 py-2 rounded-lg font-bold transition">B 獲勝</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Host User Table -->
            <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 shadow-xl">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i class="fas fa-users text-blue-500"></i> 用戶排行榜與管理</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="border-b border-gray-700 text-gray-400">
                                <th class="py-3 px-4">Roblox ID</th>
                                <th class="py-3 px-4">Email</th>
                                <th class="py-3 px-4">金幣數量</th>
                                <th class="py-3 px-4">本次押注</th>
                                <th class="py-3 px-4 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="host-table-body">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 5. Client Dashboard View -->
        <div id="view-client" class="hidden max-w-3xl mx-auto space-y-6">
            <!-- Player Info -->
            <div class="bg-gradient-to-r from-gray-800 to-gray-900 rounded-2xl p-6 border border-gray-700 shadow-lg flex justify-between items-center">
                <div>
                    <p class="text-sm text-gray-400 mb-1">您的身分</p>
                    <p id="client-roblox-id" class="text-xl font-mono font-bold text-blue-400">-</p>
                </div>
                <div class="text-right">
                    <p class="text-sm text-gray-400 mb-1">持有金幣</p>
                    <div class="text-3xl font-black text-yellow-500 flex items-center justify-end gap-2">
                        <span id="client-coins">0</span> <i class="fas fa-trophy drop-shadow-lg"></i>
                    </div>
                </div>
            </div>

            <!-- Betting Arena -->
            <div class="bg-gray-800 rounded-2xl p-8 border border-gray-700 shadow-xl text-center relative overflow-hidden min-h-[300px] flex flex-col justify-center">
                <div id="client-arena-content">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- Global Toast Container -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- Custom Modal for Confirmation -->
    <div id="confirm-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 max-w-sm w-full shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-white">確認操作</h3>
            <p id="confirm-message" class="text-gray-300 mb-6"></p>
            <div class="flex justify-end gap-3">
                <button id="btn-confirm-cancel" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-white transition">取消</button>
                <button id="btn-confirm-ok" class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-white font-bold transition">確定</button>
            </div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        // Import Firebase SDK v11 (使用 signInWithRedirect 解決 Safari 阻擋問題)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAjpVHUYvBYh1jOylLlX9gHrTLibEFjF2I",
            authDomain: "realtimebettingapp.firebaseapp.com",
            projectId: "realtimebettingapp",
            storageBucket: "realtimebettingapp.firebasestorage.app",
            messagingSenderId: "824284688785",
            appId: "1:824284688785:web:18a9c711c59a4017602a30",
            measurementId: "G-WZC238ZGBV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Constants & Globals
        const ADMIN_EMAIL = 'pixel9profold20240813@gmail.com';
        const COL_USERS = 'betting_users';
        const COL_STATE = 'betting_state';
        const COL_BETS = 'betting_bets';

        let currentUser = null;
        let usersData = [];
        let myData = null;
        let gameState = null;
        let betsData = [];
        let timerInterval = null;
        let timeLeft = 0;
        let unsubUsers, unsubState, unsubBets;

        // Custom UI Components (Toast & Modal)
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-600', error: 'bg-red-600', info: 'bg-blue-600', warning: 'bg-yellow-600' };
            const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3 toast-animate pointer-events-auto`;
            toast.innerHTML = `<i class="fas ${icons[type]}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        let confirmCallback = null;
        function showConfirm(message, callback) {
            document.getElementById('confirm-message').textContent = message;
            document.getElementById('confirm-modal').classList.remove('hidden');
            confirmCallback = callback;
        }
        document.getElementById('btn-confirm-cancel').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            confirmCallback = null;
        });
        document.getElementById('btn-confirm-ok').addEventListener('click', () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (confirmCallback) confirmCallback();
            confirmCallback = null;
        });

        function showView(viewId) {
            ['view-loading', 'view-login', 'view-bind', 'view-host', 'view-client'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            if (viewId) document.getElementById(viewId).classList.remove('hidden');
        }

        // ==========================================
        // Auth Setup (處理 Safari 跳轉回來的結果)
        // ==========================================
        getRedirectResult(auth).catch((error) => {
            console.error("登入跳轉錯誤:", error);
            showView('view-login');
            showToast("登入發生錯誤，請確定已將網址加入Firebase白名單", "error");
        });

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (!user) {
                clearListeners();
                document.getElementById('navbar').classList.add('hidden');
                showView('view-login');
            } else {
                document.getElementById('navbar').classList.remove('hidden');
                document.getElementById('nav-email').textContent = user.email;
                document.getElementById('nav-title').textContent = user.email === ADMIN_EMAIL ? '主持端控制台' : '實時押注大廳';
                setupRealtimeListeners();
            }
        });

        // 登入按鈕改為 signInWithRedirect (解決 Safari 擋彈窗)
        document.getElementById('btn-login').addEventListener('click', () => {
            document.getElementById('loading-text').textContent = "正在導向 Google 登入...";
            showView('view-loading');
            const provider = new GoogleAuthProvider();
            signInWithRedirect(auth, provider);
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // ==========================================
        // Data Listeners & Logic
        // ==========================================
        function setupRealtimeListeners() {
            showView('view-loading');
            
            unsubUsers = onSnapshot(collection(db, COL_USERS), (snap) => {
                usersData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                myData = usersData.find(u => u.uid === currentUser.uid);
                renderLogic();
            }, err => console.error(err));

            unsubState = onSnapshot(collection(db, COL_STATE), (snap) => {
                const current = snap.docs.find(d => d.id === 'current');
                gameState = current ? current.data() : null;
                handleTimer();
                renderLogic();
            }, err => console.error(err));

            unsubBets = onSnapshot(collection(db, COL_BETS), (snap) => {
                betsData = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderLogic();
            }, err => console.error(err));
        }

        function clearListeners() {
            if (unsubUsers) unsubUsers();
            if (unsubState) unsubState();
            if (unsubBets) unsubBets();
            if (timerInterval) clearInterval(timerInterval);
        }

        function renderLogic() {
            if (!currentUser) return;
            if (currentUser.email === ADMIN_EMAIL) {
                showView('view-host');
                renderHost();
            } else {
                if (!myData) {
                    showView('view-bind');
                } else {
                    showView('view-client');
                    renderClient();
                }
            }
        }

        // --- Host UI ---
        function renderHost() {
            const stateDiv = document.getElementById('host-state-content');
            const resolvePanel = document.getElementById('host-resolve-panel');
            
            if (!gameState) {
                stateDiv.innerHTML = `<p class="text-gray-500">尚未發起任何押注</p>`;
                resolvePanel.classList.add('hidden');
            } else {
                let statusHtml = '';
                if (gameState.status === 'betting') {
                    statusHtml = `<span class="text-yellow-500 font-bold animate-pulse"><i class="fas fa-spinner fa-spin"></i> 押注中... (約剩 ${timeLeft} 秒)</span>`;
                    resolvePanel.classList.remove('hidden');
                } else {
                    statusHtml = `<span class="text-green-500 font-bold"><i class="fas fa-check"></i> 已結算 (${gameState.result === 'A' ? gameState.optionA : gameState.optionB} 獲勝)</span>`;
                    resolvePanel.classList.add('hidden');
                }

                stateDiv.innerHTML = `
                    <div class="space-y-4">
                        <div class="p-4 bg-gray-900 rounded-lg border border-gray-700 text-center">
                            <h3 class="text-lg font-bold mb-2">${gameState.title}</h3>
                            <div class="flex justify-around text-gray-300">
                                <span>A: ${gameState.optionA}</span>
                                <span>B: ${gameState.optionB}</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-gray-400">狀態:</span> ${statusHtml}
                        </div>
                        <div class="text-sm text-gray-400">目前共 ${betsData.length} 人參與押注。</div>
                    </div>
                `;
            }

            const tbody = document.getElementById('host-table-body');
            tbody.innerHTML = '';
            const sortedUsers = [...usersData].sort((a, b) => (b.coins || 0) - (a.coins || 0));
            if (sortedUsers.length === 0) {
                tbody.innerHTML = `<tr><td colSpan="5" class="py-8 text-center text-gray-500">目前沒有已綁定的用戶</td></tr>`;
            } else {
                sortedUsers.forEach(u => {
                    const userBet = betsData.find(b => b.uid === u.uid);
                    let betHtml = `<span class="text-gray-600">-</span>`;
                    if (userBet) {
                        const styleClass = userBet.option === 'A' ? 'bg-green-900 text-green-300' : 'bg-blue-900 text-blue-300';
                        betHtml = `<span class="px-2 py-1 rounded text-xs font-bold ${styleClass}">選 ${userBet.option}</span>`;
                    }
                    const tr = document.createElement('tr');
                    tr.className = "border-b border-gray-700/50 hover:bg-gray-750";
                    tr.innerHTML = `
                        <td class="py-3 px-4 font-mono text-blue-400">${u.robloxId}</td>
                        <td class="py-3 px-4 text-sm text-gray-400">${u.email}</td>
                        <td class="py-3 px-4 font-bold text-yellow-500 flex items-center gap-1">${u.coins || 0} <i class="fas fa-trophy text-sm"></i></td>
                        <td class="py-3 px-4">${betHtml}</td>
                        <td class="py-3 px-4 text-right">
                            <button class="btn-reset-coins text-red-500 hover:text-red-400 p-2 hover:bg-red-500/10 rounded transition" data-uid="${u.uid}" title="清空金幣">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.querySelectorAll('.btn-reset-coins').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const uid = e.currentTarget.getAttribute('data-uid');
                        const u = usersData.find(x => x.uid === uid);
                        if(u) {
                            showConfirm(`確定要清空 ${u.robloxId} 的所有金幣嗎？`, async () => {
                                await updateDoc(doc(db, COL_USERS, uid), { coins: 0 });
                                showToast("金幣已清空", "success");
                            });
                        }
                    });
                });
            }
        }

        document.getElementById('btn-start-bet').addEventListener('click', async () => {
            const title = document.getElementById('host-title').value;
            const optA = document.getElementById('host-optA').value;
            const optB = document.getElementById('host-optB').value;
            if (!title || !optA || !optB) return showToast("請填寫完整押注資訊", 'warning');

            const deletePromises = betsData.map(bet => deleteDoc(doc(db, COL_BETS, bet.id)));
            await Promise.all(deletePromises);

            await setDoc(doc(db, COL_STATE, 'current'), {
                title, optionA: optA, optionB: optB,
                status: 'betting', startTime: Date.now(), result: null
            });
            showToast("押注已發起！", "success");
        });

        const resolveBet = async (winnerOption) => {
            const winnerText = winnerOption === 'A' ? gameState.optionA : gameState.optionB;
            showConfirm(`確定結果為「${winnerText}」嗎？`, async () => {
                try {
                    await updateDoc(doc(db, COL_STATE, 'current'), { status: 'resolved', result: winnerOption });
                    let winnersCount = 0;
                    for (const bet of betsData) {
                        const isTimeValid = (bet.betTime - gameState.startTime) <= 11000;
                        if (bet.option === winnerOption && isTimeValid) {
                            const winner = usersData.find(u => u.uid === bet.uid);
                            if (winner) {
                                await updateDoc(doc(db, COL_USERS, bet.uid), { coins: (winner.coins || 0) + 1 });
                                winnersCount++;
                            }
                        }
                    }
                    showToast(`結算完成！共 ${winnersCount} 人獲勝`, "success");
                } catch (err) { showToast("結算發生錯誤", "error"); }
            });
        };

        document.getElementById('btn-resolve-a').addEventListener('click', () => resolveBet('A'));
        document.getElementById('btn-resolve-b').addEventListener('click', () => resolveBet('B'));

        // --- Client UI ---
        document.getElementById('btn-bind').addEventListener('click', async () => {
            const input = document.getElementById('input-roblox').value.trim();
            const errDiv = document.getElementById('bind-error');
            const errText = document.getElementById('bind-error-text');
            errDiv.classList.add('hidden');
            if (!input) { errText.textContent = "請輸入Roblox ID"; return errDiv.classList.remove('hidden'); }
            if (usersData.some(u => u.robloxId.toLowerCase() === input.toLowerCase())) {
                errText.textContent = "此 ID 已經被綁定過了！"; return errDiv.classList.remove('hidden');
            }
            try {
                await setDoc(doc(db, COL_USERS, currentUser.uid), { uid: currentUser.uid, email: currentUser.email, robloxId: input, coins: 0 });
                showToast("綁定成功！", "success");
            } catch (err) {
                errText.textContent = "綁定失敗，請重試或檢查權限設定"; errDiv.classList.remove('hidden');
            }
        });

        function handleTimer() {
            if (timerInterval) clearInterval(timerInterval);
            if (gameState?.status === 'betting') {
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                    const remaining = 10 - elapsed;
                    if (remaining <= 0) { timeLeft = 0; clearInterval(timerInterval); } else { timeLeft = remaining; }
                    updateClientUIFromTimer();
                    if (currentUser && currentUser.email === ADMIN_EMAIL) renderHost();
                }, 100);
            } else { timeLeft = 0; }
        }

        function updateClientUIFromTimer() {
            if (currentUser?.email === ADMIN_EMAIL || !myData) return;
            const timeSpan = document.getElementById('client-time-left');
            if (timeSpan) timeSpan.textContent = `${timeLeft} 秒`;
            if (timeLeft <= 0) {
                document.querySelectorAll('.btn-bet').forEach(b => {
                    b.disabled = true; b.classList.add('opacity-50', 'cursor-not-allowed');
                });
            }
        }

        function renderClient() {
            document.getElementById('client-roblox-id').textContent = myData.robloxId;
            document.getElementById('client-coins').textContent = myData.coins || 0;
            const arena = document.getElementById('client-arena-content');
            const myBet = betsData.find(b => b.uid === currentUser.uid);

            if (!gameState || gameState.status === 'idle') {
                arena.innerHTML = `<div class="py-12"><i class="fas fa-clock text-6xl text-gray-600 mx-auto mb-4 animate-bounce"></i><h2 class="text-2xl font-bold text-gray-400">等待主持端發起押注...</h2></div>`;
                return;
            }

            if (gameState.status === 'betting') {
                let content = `
                    <div class="mb-8">
                        <h2 class="text-3xl font-black mb-2">${gameState.title}</h2>
                        <div class="inline-block bg-gray-900 px-6 py-2 rounded-full border border-gray-700">
                            <span class="text-yellow-500 font-bold flex items-center gap-2">
                                <i class="fas fa-stopwatch"></i> 剩餘時間: <span id="client-time-left">${timeLeft} 秒</span>
                            </span>
                        </div>
                    </div>`;

                if (!myBet) {
                    const disableClass = timeLeft <= 0 ? "opacity-50 cursor-not-allowed" : "";
                    content += `
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <button class="btn-bet group relative bg-gray-900 border-2 border-green-500/50 hover:border-green-500 hover:bg-green-500/10 rounded-xl p-6 transition ${disableClass}" data-opt="A">
                                <span class="block text-sm text-green-500 mb-2">選項 A</span><span class="block text-2xl font-bold">${gameState.optionA}</span>
                            </button>
                            <button class="btn-bet group relative bg-gray-900 border-2 border-blue-500/50 hover:border-blue-500 hover:bg-blue-500/10 rounded-xl p-6 transition ${disableClass}" data-opt="B">
                                <span class="block text-sm text-blue-500 mb-2">選項 B</span><span class="block text-2xl font-bold">${gameState.optionB}</span>
                            </button>
                        </div>`;
                    arena.innerHTML = content;
                    document.querySelectorAll('.btn-bet').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            if (timeLeft <= 0) return;
                            try {
                                await setDoc(doc(db, COL_BETS, currentUser.uid), { uid: currentUser.uid, robloxId: myData.robloxId, option: e.currentTarget.getAttribute('data-opt'), betTime: Date.now() });
                                showToast("押注成功！", "success");
                            } catch (err) { showToast("押注失敗，請確保在時限內", "error"); }
                        });
                    });
                } else {
                    const chosenText = myBet.option === 'A' ? gameState.optionA : gameState.optionB;
                    arena.innerHTML = content + `<div class="py-8"><i class="fas fa-check-circle text-6xl text-green-500 mx-auto mb-4"></i><h3 class="text-xl font-bold">押注成功！</h3><p class="text-gray-400 mt-2">您選擇了：<span class="font-bold text-white">${chosenText}</span></p><p class="text-sm text-gray-500 mt-4"><i class="fas fa-spinner fa-spin"></i> 等待結果結算中...</p></div>`;
                }
                return;
            }

            if (gameState.status === 'resolved') {
                const winnerText = gameState.result === 'A' ? gameState.optionA : gameState.optionB;
                let resultHtml = `<div class="text-gray-500 mt-4">您未參與此局押注</div>`;
                if (myBet) {
                    if (myBet.option === gameState.result) {
                        resultHtml = `<div class="text-green-400 font-bold flex items-center justify-center gap-2 text-2xl mt-4"><i class="fas fa-trophy"></i> 恭喜！您贏得了 1 金幣</div>`;
                    } else {
                        resultHtml = `<div class="text-red-400 font-bold flex items-center justify-center gap-2 text-2xl mt-4"><i class="fas fa-times-circle"></i> 猜錯了！再接再厲</div>`;
                    }
                }
                arena.innerHTML = `<div class="py-8"><h2 class="text-2xl font-bold mb-6 text-gray-300">本局結果</h2><div class="text-4xl font-black text-white mb-2 p-4 bg-gray-900 rounded-lg inline-block border border-gray-700 shadow-inner">${winnerText} 獲勝！</div>${resultHtml}</div>`;
            }
        }
    </script>
</body>
</html>
